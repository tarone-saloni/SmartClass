name: Agent CI

on:
  push:
    paths:
      - "agents/**"
      - ".github/workflows/ci-agent.yml"
  pull_request:
    paths:
      - "agents/**"
      - ".github/workflows/ci-agent.yml"

defaults:
  run:
    working-directory: agents

jobs:
  test:
    name: Test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    env:
      # tests mock all API calls; key only satisfies config.py startup check
      ANTHROPIC_API_KEY: sk-test-ci-dummy-key
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: agents/requirements.txt

      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/requirements.txt

      - run: pip install ruff
      - run: ruff check . --exit-zero
      - run: ruff format --check . --diff || true
